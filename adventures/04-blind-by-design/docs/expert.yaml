level: expert
emoji: "­¤ö┤"
title: "Read the chart"
community_url: "https://community.open-ecosystem.com/t/read-the-chart-adventure-04-expert"

summary: |
  Spans are already flowing into Tempo from the OpenFeature `TracesHook`, but the metrics half is dead ŌĆö the `MeterProvider` has no exporter and the `MetricsHook` was never registered. The dashboard the operator wants to triage from is empty. The k6 loadgen is idle, waiting for a flag flip to turn it on.

backstory: |
  The trial just went wide. Phase 3 of the new vision amplifier ŌĆö `vision_amplifier_v2` ŌĆö was approved for the full cohort yesterday morning. The promise was straightforward: subjects emerge with sharper eyesight than they walked in with. By mid-afternoon the audit log was screaming. Subjects were stabilising 200ms slower, and roughly one in ten of them was emerging **blind** ŌĆö containment failure recorded as an HTTP 500. The lab director pulled up the **Feature Flag Metrics** dashboard expecting to triage visually. The dashboard was dark. Someone had wired up traces but never finished the metrics half. There is no chart to read. The lab is studying eyesight and the lab itself cannot see.

  Your job, in order: **turn on the lights**, find the bad arm of the trial, and **halt enrolment** on the amplifier ŌĆö all without redeploying the lab. That last constraint is the whole point of feature flags: when a rollout starts misbehaving in production, you need an operational lever that does not take twenty minutes to pull. Save the file, watch the dose drop, watch the 5xx rate fall back to baseline, watch the next batch of subjects walk out seeing.

objective:
  - "**Spans for `fun-with-flags-java-spring` are visible in Tempo** with `feature_flag.context.<key>` attributes ŌĆö searching `feature_flag.context.dose=underdose` lights up the requests where a tech mis-dosed, with `feature_flag.variant=clouded` on the same span."
  - "**`feature_flag_evaluation_requests_total` is non-zero in Prometheus** ŌĆö flag evaluations show up as counters, not just spans."
  - "**The Feature Flag Metrics dashboard renders.** Variant-distribution, error rate, latency p99 ŌĆö all populated from the metric counters."
  - "**The `vision_amplifier_v2` rollout is rolled back to 100% off** ŌĆö without redeploying the lab."
  - "**HTTP 5xx rate over the last minute drops below 1%.** The bad arm is contained."

what_you_learn:
  - "How the OpenFeature OpenTelemetry hooks (`TracesHook` and `MetricsHook`) join flag evaluations to the rest of an application's telemetry without a separate ingestion path"
  - "How to **author your own `Hook`** ŌĆö a tiny class that copies merged-eval-context attributes onto the active OTel span ŌĆö to close the loop between *why* a flag resolved the way it did and *what* the operator sees in Tempo"
  - "How [`fractional`](https://flagd.dev/reference/custom-operations/fractional-operation/) rollout in flagd buckets users by `targetingKey` ŌĆö same key, same bucket, every request ŌĆö and how to read that bucketing off a dashboard"
  - "How a **flag flip** is a faster operational lever than a redeploy when a rollout is misbehaving ŌĆö the difference between a one-line config change and a twenty-minute deployment"

