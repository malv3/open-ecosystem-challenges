    description: "Single window into the LGTM stack (admin / admin)"
  - name: jq
    url: "https://jqlang.github.io/jq/"
    description: "Pretty-print and filter JSON from curl"

services:
  - name: "Spring Boot lab"
    port: 8080
    description: "The application under test. Open `http://localhost:8080/` to get a vision_state reading back. Add a `userId` query parameter (e.g. `?userId=subject-42`) to give the fractional rollout a stable bucketing key."
  - name: Grafana
    port: 3000
    credentials: "admin / admin"
    description: "Login is `admin` / `admin` (skip the \"change your password\" prompt). Go to **Dashboards ŌåÆ Fun With Flags ŌĆö Feature Flag Metrics** (empty for now) or **Explore ŌåÆ Tempo** to search by service `fun-with-flags-java-spring`. Traces work even before you wire up metrics."
  - name: Prometheus
    port: 9090
    description: "Useful for curl-driven debugging: `curl 'http://localhost:9090/api/v1/query?query=feature_flag_evaluation_requests_total'`."
  - name: Tempo
    port: 3200
    description: "Tempo's HTTP API ŌĆö `verify.sh` uses `http://localhost:3200/api/search?tags=service.name=fun-with-flags-java-spring` to assert traces are flowing."
  - name: flagd
    internal: true
    description: "Runs on the docker-internal network only. The lab and the loadgen reach it as `flagd:8013`; no port forwarding needed. (`verify.sh` runs inside the workspace container so it can reach `flagd:8013` directly.)"
  - name: "OTLP receivers"
    port: "4317 (gRPC) / 4318 (HTTP)"
    description: "The Spring Boot app exports traces (and, after you finish the wiring, metrics) to the LGTM stack here."

how_to_play:
  - id: start-lab
    title: "Start the Lab"
    content: |
      The sibling containers (flagd, LGTM stack, k6 loadgen) are already up ŌĆö the Spring Boot lab itself isn't. Boot it before you click into the Ports tab so the forwarded `:8080` is actually serving. Either click **Run** on `Laboratory` in the Spring Boot Dashboard panel (or press **F5** with `Laboratory.java` open), or, from the terminal:

      ```bash
      ./mvnw spring-boot:run
      ```

      Spans start flowing into Tempo on the first request ŌĆö the trace pipeline is already wired. The metrics half is dead (task 4a) so the Grafana dashboard panels stay empty until you fix it.

  - id: metrics-exporter
    title: "Turn on the metrics exporter"
    content: |
      OTel ships two parallel pipelines: **traces** (per-request spans, already flowing into Tempo) and **metrics** (aggregate counters, dead). The OpenTelemetry Java Agent attached to the lab JVM has both pipelines plumbed and pointed at the LGTM stack, but its config says `otel.metrics.exporter=none` ŌĆö anything the meter records goes nowhere. Flip the exporter on and the OpenFeature `MetricsHook` (next step) finds the working meter provider through `GlobalOpenTelemetry` without any further plumbing.

      `otel.properties` (next to `pom.xml`) is what the agent reads on startup. While you're there, look at the export interval ŌĆö the agent's default makes the next ten minutes harder than they need to be.

  - id: metrics-hook
    title: "Register MetricsHook on the OpenFeature API"
    content: |
      The OpenFeature OTel contrib library ships two hooks that turn flag evaluations into telemetry: **`TracesHook`** emits a span event on the active span (that's why flag evaluations show up nested inside HTTP request spans in Tempo); **`MetricsHook`** emits four counters per evaluation ŌĆö `feature_flag_evaluation_requests_total` and friends ŌĆö that power the dashboard panels.

      `OpenFeatureConfig.java` registers `TracesHook` but stops there. `MetricsHook` needs an `OpenTelemetry` handle to find the meter provider ŌĆö the agent installs one globally at JVM start, so `GlobalOpenTelemetry.get()` is the way to reach it. Even once `MetricsHook` is registered, the **Fun With Flags ŌĆö Feature Flag Metrics** dashboard stays empty until something drives traffic ŌĆö that's the next step.

  - id: context-span-hook
    title: "Author and register your own ContextSpanHook"
    content: |
      The two contrib hooks tell you *what* happened ŌĆö which flag, which variant, which reason. The `AuditHook` shipped with this level (carried over from Intermediate) writes the durable archive view to disk. What's missing is the **on-call's view in Tempo**: when a span shows `feature_flag.variant=clouded`, the operator can't see *why* without a separate hop into the audit log. Write a third hook that copies the merged eval context attributes onto the active OTel span as `feature_flag.context.<key>` ŌĆö same data the audit log records, but visible right next to the variant in the trace UI.

      The shape is roughly:

      ```text
      before(hookCtx) {
          span = active OTel span
          for each allowlisted key in merged eval context:
              span.setAttribute("feature_flag.context." + key, value)
      }
      ```

      The `before` callback receives a `HookContext`, and `getCtx()` returns the **merged** evaluation context (global + transaction + invocation) ŌĆö exactly what drove the flag's resolution. Span attributes go on the currently active span; the OpenFeature hook fires inside its scope. Register it alongside `TracesHook` / `MetricsHook` in `OpenFeatureConfig`. The verifier searches Tempo for `feature_flag.context.dose=underdose` once you're done ŌĆö that's the smoke signal.

      > ŌÜĀ’ĖÅ **Allowlist, don't iterate.** Use a fixed allowlist (`List.of("species", "country", "dose")`) ŌĆö never iterate the whole eval context. The merged context routinely carries the OpenFeature `targetingKey`, typically a stable user id that joins to email and account data in real apps. Span attributes are retained for days in Tempo and indexed at scale; once they ship, redacting after the fact is hard. Same discipline `AuditHook` already follows for the audit log, same reason. See [OpenTelemetry's security guidance](https://opentelemetry.io/docs/security/).

  - id: rollback
    title: "Turn on the loadgen, find the bad rollout, roll it back"
    content: |
      `fractional` is flagd's bucketing operation: given a list of `[variant, percent]` pairs, it deterministically assigns each evaluation to a variant based on a hash of the **`targetingKey`** on the eval context. Same key ŌåÆ same bucket ŌåÆ same variant. Different keys spread across the percentages. **If no targeting key is set, every evaluation hashes the same way, every request lands in the same bucket, and the percentages do nothing.** The `SpeciesInterceptor` shipped with this level reads `?userId=` and threads it through as the targetingKey ŌĆö the lab is already serving fractional rollouts correctly without you touching it.

      `flags.json` in the expert directory has a `loadgen_active` flag (off) and the misbehaving `vision_amplifier_v2` flag. flagd watches the file and picks up changes within a second; the k6 loadgen polls `loadgen_active` every two seconds, so flipping it turns on five virtual users hammering the lab. When the loadgen turns on, latency p99 should climb around 200ms and the 5xx rate around 10% ŌĆö confirmation that something is firing. The dashboard's variant-distribution panel tells you which one. Roll the offender back via the flag definition, watch the dashboard recover.

      **No deploy. No rebuild. No restart of the lab.**

