# OpenTelemetry Java Agent configuration.
#
# Read by the agent on JVM startup (via OTEL_JAVAAGENT_CONFIGURATION_FILE
# in docker-compose.yml). Edit + restart the lab to apply.
#
# Reference: https://opentelemetry.io/docs/zero-code/java/agent/configuration/

otel.service.name=fun-with-flags-java-spring
otel.exporter.otlp.endpoint=http://lgtm:4317
otel.exporter.otlp.protocol=grpc

# Traces flow into Tempo. Auto-instrumentation wraps every HTTP request
# in a server span, so the OpenFeature TracesHook + ContextSpanHook
# (once you write it) have an active span to attach to.
otel.traces.exporter=otlp

# TODO Phase 3 task: flip from "none" to "otlp" so flag-evaluation
# metrics start exporting to the LGTM stack and the Feature Flag Metrics
# dashboard renders.
otel.metrics.exporter=none

# Once metrics are on, set a short export interval so the dashboard
# updates within ten seconds of new traffic instead of waiting a minute.
otel.metric.export.interval=10000

otel.logs.exporter=none
