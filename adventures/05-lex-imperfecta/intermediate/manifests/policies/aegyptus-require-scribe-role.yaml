apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: aegyptus-require-scribe-role
  annotations:
    policies.kyverno.io/title: Aegyptus — Require Scribe Role
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod, Label
    policies.kyverno.io/description: >-
      Aegyptus is the Republic's centre of scholarship — only scribe workloads
      are permitted to operate here. All pods must carry the
      'republic.rome/role: scribe' label. This is a provincial law, enacted by
      the magistrate of Aegyptus.
spec:
  validationActions:
    - Audit
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
    namespaceSelector:
      matchLabels:
        republic.rome/realm: province
  validations:
    - expression: >-
        has(object.metadata.labels) &&
        'republic.rome/role' in object.metadata.labels &&
        object.metadata.labels['republic.rome/role'] == 'scribe'
      message: "Aegyptus permits only scribe workloads. Pods must carry the 'republic.rome/role: scribe' label to be admitted."
